# =============================================================================
# infra-formateur — environnement hébergé pour la formation (VPS 4 vCore / 16 Go)
# =============================================================================
# 8 postes stagiaires (code-server = VS Code navigateur) + DinD isolé chacun
# + 1 LocalStack PARTAGÉ (le "cloud" commun) + Caddy (reverse proxy, TLS auto).
# GitLab : on utilise gitlab.com (Mode Cloud) — pas de gitlab-ce ici.
#
#   cp .env.example .env   # définir DOMAIN, EMAIL, mots de passe
#   docker compose up -d
#
# Accès : lab1.example.com … lab8.example.com  (VS Code par stagiaire)
#         labls.example.com  (console LocalStack)
# =============================================================================

x-student-box: &student-box
  build: ./student-box
  image: gitops-student:local
  restart: unless-stopped
  # mem_limit / cpus : garde-fous pour que 8 postes cohabitent
  mem_limit: 1g
  networks: [lab]

x-dind: &dind
  image: docker:27-dind
  restart: unless-stopped
  privileged: true            # requis par DinD — ISOLÉ par stagiaire (pas le socket hôte)
  command: ["--tls=false"]
  mem_limit: 1g
  networks: [lab]

services:

  # --------- Reverse proxy (TLS wildcard via Cloudflare DNS-01) --------------
  # Image Caddy + plugin DNS Cloudflare (l'image stock caddy:2 ne l'inclut pas).
  # → certificat WILDCARD *.DOMAIN, qui fonctionne DERRIÈRE le proxy Cloudflare
  #   (le challenge HTTP-01 entrerait en conflit avec le proxy ; DNS-01 non).
  caddy:
    build: ./caddy            # Dockerfile = caddy + module cloudflare (xcaddy)
    image: caddy-cf:local
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN manquant dans .env}              # ex: example.com (la ZONE)
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN manquant dans .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # certificats (persistant)
      - caddy_config:/config
    networks: [lab]

  # --------- LocalStack PARTAGÉ (le cloud commun) ---------------------------
  localstack:
    image: localstack/localstack:latest
    restart: unless-stopped
    environment:
      - SERVICES=s3,ec2,iam,sts
      - DEBUG=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # LocalStack côté hôte (service partagé)
    networks: [lab]
    # Accessible par les postes via http://localstack:4566 (réseau interne)

  # =========================== POSTES STAGIAIRES =============================
  # Chaque poste = 1 code-server + 1 DinD dédié. DOCKER_HOST pointe vers le DinD.
  # (8 blocs explicites : Docker Compose ne « boucle » pas — anchors pour rester DRY.)

  student-1:
    <<: *student-box
    container_name: student-1
    environment:
      - PASSWORD=${S1_PASSWORD:?S1_PASSWORD manquant}
      - DOCKER_HOST=tcp://dind-1:2375
    depends_on: [dind-1]
  dind-1: { <<: *dind, container_name: dind-1 }

  student-2:
    <<: *student-box
    container_name: student-2
    environment:
      - PASSWORD=${S2_PASSWORD:?S2_PASSWORD manquant}
